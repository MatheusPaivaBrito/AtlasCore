name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.4.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with docs

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest tests

      - name: Build API Docker images
        run: docker compose --profile apis build

      - name: Build Portuguese docs
        run: poetry run mkdocs build -f docs-site/mkdocs.pt-br.yml --strict

      - name: Build English docs
        run: poetry run mkdocs build -f docs-site/mkdocs.en.yml --strict
