# Alembic belongs to auth_api because this service owns the identity database.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = ../..
path_separator = os
sqlalchemy.url = postgresql+psycopg://atlas:atlas@postgres:5432/atlas_auth

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
