services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas_core}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas_core}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: atlas-kafka
    profiles: ["dev", "eventing", "platform"]
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  loki:
    image: grafana/loki:3.0.0
    container_name: atlas-loki
    profiles: ["dev", "observability", "platform"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.0.0
    container_name: atlas-grafana
    profiles: ["dev", "observability", "platform"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - loki

  auth-api:
    build:
      context: .
      dockerfile: apps/auth_api/dockerfile
    container_name: atlas-auth-api
    profiles: ["dev", "auth", "apis"]
    environment:
      SERVICE_NAME: auth_api
      REDIS_URL: redis://redis:6379/1
    ports:
      - "${AUTH_API_PORT:-8001}:8000"
    depends_on:
      redis:
        condition: service_healthy

  core-api:
    build:
      context: .
      dockerfile: apps/core_api/dockerfile
    container_name: atlas-core-api
    profiles: ["dev", "core", "apis"]
    environment:
      SERVICE_NAME: core_api
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas}@postgres:5432/${POSTGRES_DB:-atlas_core}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "${CORE_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  eventing-api:
    build:
      context: .
      dockerfile: apps/eventing_api/dockerfile
    container_name: atlas-eventing-api
    profiles: ["dev", "eventing", "platform"]
    environment:
      SERVICE_NAME: eventing_api
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas}@postgres:5432/${POSTGRES_DB:-atlas_core}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${EVENTING_API_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-api:
    build:
      context: .
      dockerfile: apps/notification_api/dockerfile
    container_name: atlas-notification-api
    profiles: ["dev", "notifications", "platform"]
    environment:
      SERVICE_NAME: notification_api
      REDIS_URL: redis://redis:6379/1
    ports:
      - "${NOTIFICATION_API_PORT:-8003}:8000"
    depends_on:
      redis:
        condition: service_healthy

  observability-api:
    build:
      context: .
      dockerfile: apps/observability_api/dockerfile
    container_name: atlas-observability-api
    profiles: ["dev", "observability", "platform"]
    environment:
      SERVICE_NAME: observability_api
      LOKI_URL: http://loki:3100
      GRAFANA_URL: http://grafana:3000
    ports:
      - "${OBSERVABILITY_API_PORT:-8004}:8000"
    depends_on:
      - loki
      - grafana

volumes:
  postgres_data:
  redis_data:
