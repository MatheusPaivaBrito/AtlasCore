x-atlas-service-urls: &atlas-service-urls
  CORE_API_PUBLIC_URL: http://localhost:${CORE_API_PORT:-8000}
  AUTH_API_PUBLIC_URL: http://localhost:${AUTH_API_PORT:-8001}
  EVENTING_API_PUBLIC_URL: http://localhost:${EVENTING_API_PORT:-8002}
  NOTIFICATION_API_PUBLIC_URL: http://localhost:${NOTIFICATION_API_PORT:-8003}
  OBSERVABILITY_API_PUBLIC_URL: http://localhost:${OBSERVABILITY_API_PORT:-8004}
  CORE_API_INTERNAL_URL: http://core-api:8000
  AUTH_API_INTERNAL_URL: http://auth-api:8000
  EVENTING_API_INTERNAL_URL: http://eventing-api:8000
  NOTIFICATION_API_INTERNAL_URL: http://notification-api:8000
  OBSERVABILITY_API_INTERNAL_URL: http://observability-api:8000

x-atlas-cors: &atlas-cors
  CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-1}
  CORE_API_CORS_ENABLED: ${CORE_API_CORS_ENABLED:-1}
  CORE_API_CORS_ALLOWED_ORIGINS: ${CORE_API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
  AUTH_API_CORS_ENABLED: ${AUTH_API_CORS_ENABLED:-1}
  AUTH_API_CORS_ALLOWED_ORIGINS: ${AUTH_API_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
  EVENTING_API_CORS_ENABLED: ${EVENTING_API_CORS_ENABLED:-1}
  EVENTING_API_CORS_ALLOWED_ORIGINS: ${EVENTING_API_CORS_ALLOWED_ORIGINS:-}
  NOTIFICATION_API_CORS_ENABLED: ${NOTIFICATION_API_CORS_ENABLED:-1}
  NOTIFICATION_API_CORS_ALLOWED_ORIGINS: ${NOTIFICATION_API_CORS_ALLOWED_ORIGINS:-}
  OBSERVABILITY_API_CORS_ENABLED: ${OBSERVABILITY_API_CORS_ENABLED:-1}
  OBSERVABILITY_API_CORS_ALLOWED_ORIGINS: ${OBSERVABILITY_API_CORS_ALLOWED_ORIGINS:-}

x-atlas-postgres-runtime: &atlas-postgres-runtime
  POSTGRES_USER: ${POSTGRES_USER:-atlas}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_ADMIN_DB: ${POSTGRES_ADMIN_DB:-postgres}
  POSTGRES_DB: ${POSTGRES_DB:-atlas_core}

x-atlas-redis-runtime: &atlas-redis-runtime
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: ${REDIS_DB:-1}

services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas_core}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atlas} -d ${POSTGRES_DB:-atlas_core}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: atlas-kafka
    profiles: ["dev", "apis", "eventing", "platform"]
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  loki:
    image: grafana/loki:3.0.0
    container_name: atlas-loki
    profiles: ["dev", "apis", "observability", "platform"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.0.0
    container_name: atlas-grafana
    profiles: ["dev", "apis", "observability", "platform"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - loki

  auth-api:
    build:
      context: .
      dockerfile: apps/auth_api/dockerfile
    container_name: atlas-auth-api
    profiles: ["dev", "auth", "apis"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors]
      SERVICE_NAME: auth_api
      AUTH_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas}@postgres:5432/${AUTH_POSTGRES_DB:-atlas_auth}
      AUTH_REDIS_URL: redis://redis:6379/${AUTH_REDIS_DB:-1}
      AUTH_REDIS_KEY_PREFIX: ${AUTH_REDIS_KEY_PREFIX:-auth}
      AUTH_INTERNAL_SERVICE_KEYS: ${AUTH_INTERNAL_SERVICE_KEYS:-core_api:atlas-core-to-auth-dev-key}
      AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS: ${AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:-900}
      AUTH_EXPOSE_PASSWORD_RESET_TOKEN: ${AUTH_EXPOSE_PASSWORD_RESET_TOKEN:-0}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
      AUTH_LOGIN_BLOCK_SECONDS: ${AUTH_LOGIN_BLOCK_SECONDS:-900}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-10}
      AUTH_PASSWORD_REQUIRE_UPPERCASE: ${AUTH_PASSWORD_REQUIRE_UPPERCASE:-1}
      AUTH_PASSWORD_REQUIRE_LOWERCASE: ${AUTH_PASSWORD_REQUIRE_LOWERCASE:-1}
      AUTH_PASSWORD_REQUIRE_NUMBER: ${AUTH_PASSWORD_REQUIRE_NUMBER:-1}
      AUTH_PASSWORD_REQUIRE_SPECIAL: ${AUTH_PASSWORD_REQUIRE_SPECIAL:-1}
    ports:
      - "${AUTH_API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-migrate:
    build:
      context: .
      dockerfile: apps/auth_api/dockerfile
    profiles: ["jobs"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors, *atlas-postgres-runtime, *atlas-redis-runtime]
      SERVICE_NAME: auth_api
      AUTH_POSTGRES_DB: ${AUTH_POSTGRES_DB:-atlas_auth}
      AUTH_REDIS_DB: ${AUTH_REDIS_DB:-1}
      AUTH_REDIS_KEY_PREFIX: ${AUTH_REDIS_KEY_PREFIX:-auth}
      AUTH_INTERNAL_SERVICE_KEYS: ${AUTH_INTERNAL_SERVICE_KEYS:-core_api:atlas-core-to-auth-dev-key}
      AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS: ${AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:-900}
      AUTH_EXPOSE_PASSWORD_RESET_TOKEN: ${AUTH_EXPOSE_PASSWORD_RESET_TOKEN:-0}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
      AUTH_LOGIN_BLOCK_SECONDS: ${AUTH_LOGIN_BLOCK_SECONDS:-900}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-10}
      AUTH_PASSWORD_REQUIRE_UPPERCASE: ${AUTH_PASSWORD_REQUIRE_UPPERCASE:-1}
      AUTH_PASSWORD_REQUIRE_LOWERCASE: ${AUTH_PASSWORD_REQUIRE_LOWERCASE:-1}
      AUTH_PASSWORD_REQUIRE_NUMBER: ${AUTH_PASSWORD_REQUIRE_NUMBER:-1}
      AUTH_PASSWORD_REQUIRE_SPECIAL: ${AUTH_PASSWORD_REQUIRE_SPECIAL:-1}
    command: >
      sh -c "poetry run python toolbox/checks/ensure_runtime_dependencies.py auth_api
      && poetry run alembic -c apps/auth_api/alembic.ini upgrade head"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  auth-seed:
    build:
      context: .
      dockerfile: apps/auth_api/dockerfile
    profiles: ["jobs"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors, *atlas-postgres-runtime, *atlas-redis-runtime]
      SERVICE_NAME: auth_api
      AUTH_POSTGRES_DB: ${AUTH_POSTGRES_DB:-atlas_auth}
      AUTH_REDIS_DB: ${AUTH_REDIS_DB:-1}
      AUTH_REDIS_KEY_PREFIX: ${AUTH_REDIS_KEY_PREFIX:-auth}
      AUTH_INTERNAL_SERVICE_KEYS: ${AUTH_INTERNAL_SERVICE_KEYS:-core_api:atlas-core-to-auth-dev-key}
      AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS: ${AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:-900}
      AUTH_EXPOSE_PASSWORD_RESET_TOKEN: ${AUTH_EXPOSE_PASSWORD_RESET_TOKEN:-0}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_WINDOW_SECONDS: ${AUTH_LOGIN_WINDOW_SECONDS:-900}
      AUTH_LOGIN_BLOCK_SECONDS: ${AUTH_LOGIN_BLOCK_SECONDS:-900}
      AUTH_PASSWORD_MIN_LENGTH: ${AUTH_PASSWORD_MIN_LENGTH:-10}
      AUTH_PASSWORD_REQUIRE_UPPERCASE: ${AUTH_PASSWORD_REQUIRE_UPPERCASE:-1}
      AUTH_PASSWORD_REQUIRE_LOWERCASE: ${AUTH_PASSWORD_REQUIRE_LOWERCASE:-1}
      AUTH_PASSWORD_REQUIRE_NUMBER: ${AUTH_PASSWORD_REQUIRE_NUMBER:-1}
      AUTH_PASSWORD_REQUIRE_SPECIAL: ${AUTH_PASSWORD_REQUIRE_SPECIAL:-1}
    command: >
      sh -c "poetry run python toolbox/checks/ensure_runtime_dependencies.py auth_api
      && poetry run alembic -c apps/auth_api/alembic.ini upgrade head
      && poetry run python toolbox/seeds/auth_api/user_seed.py"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  core-api:
    build:
      context: .
      dockerfile: apps/core_api/dockerfile
    container_name: atlas-core-api
    profiles: ["dev", "core", "apis"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors]
      SERVICE_NAME: core_api
      CORE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas}@postgres:5432/${CORE_POSTGRES_DB:-atlas_core}
      CORE_REDIS_URL: redis://redis:6379/${CORE_REDIS_DB:-1}
      CORE_REDIS_KEY_PREFIX: ${CORE_REDIS_KEY_PREFIX:-core}
      CORE_TO_AUTH_SERVICE_KEY: ${CORE_TO_AUTH_SERVICE_KEY:-atlas-core-to-auth-dev-key}
    ports:
      - "${CORE_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-migrate:
    build:
      context: .
      dockerfile: apps/core_api/dockerfile
    profiles: ["jobs"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors, *atlas-postgres-runtime, *atlas-redis-runtime]
      SERVICE_NAME: core_api
      CORE_POSTGRES_DB: ${CORE_POSTGRES_DB:-atlas_core}
      CORE_REDIS_DB: ${CORE_REDIS_DB:-1}
      CORE_REDIS_KEY_PREFIX: ${CORE_REDIS_KEY_PREFIX:-core}
      CORE_TO_AUTH_SERVICE_KEY: ${CORE_TO_AUTH_SERVICE_KEY:-atlas-core-to-auth-dev-key}
    command: >
      sh -c "poetry run python toolbox/checks/ensure_runtime_dependencies.py core_api
      && poetry run alembic -c apps/core_api/alembic.ini upgrade head"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  core-seed:
    build:
      context: .
      dockerfile: apps/core_api/dockerfile
    profiles: ["jobs"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors, *atlas-postgres-runtime, *atlas-redis-runtime]
      SERVICE_NAME: core_api
      CORE_POSTGRES_DB: ${CORE_POSTGRES_DB:-atlas_core}
      CORE_REDIS_DB: ${CORE_REDIS_DB:-1}
      CORE_REDIS_KEY_PREFIX: ${CORE_REDIS_KEY_PREFIX:-core}
      CORE_TO_AUTH_SERVICE_KEY: ${CORE_TO_AUTH_SERVICE_KEY:-atlas-core-to-auth-dev-key}
    command: >
      sh -c "poetry run python toolbox/checks/ensure_runtime_dependencies.py core_api
      && poetry run alembic -c apps/core_api/alembic.ini upgrade head
      && poetry run python toolbox/seeds/core_api/library_seed.py"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  eventing-api:
    build:
      context: .
      dockerfile: apps/eventing_api/dockerfile
    container_name: atlas-eventing-api
    profiles: ["dev", "apis", "eventing", "platform"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors]
      SERVICE_NAME: eventing_api
      EVENTING_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atlas}:${POSTGRES_PASSWORD:-atlas}@postgres:5432/${EVENTING_POSTGRES_DB:-atlas_eventing}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${EVENTING_API_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-api:
    build:
      context: .
      dockerfile: apps/notification_api/dockerfile
    container_name: atlas-notification-api
    profiles: ["dev", "apis", "notifications", "platform"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors]
      SERVICE_NAME: notification_api
      NOTIFICATION_REDIS_URL: redis://redis:6379/${NOTIFICATION_REDIS_DB:-1}
      NOTIFICATION_REDIS_KEY_PREFIX: ${NOTIFICATION_REDIS_KEY_PREFIX:-notification}
      NOTIFICATION_SENDGRID_API_KEY: ${NOTIFICATION_SENDGRID_API_KEY:-}
      NOTIFICATION_DEFAULT_EMAIL_FROM: ${NOTIFICATION_DEFAULT_EMAIL_FROM:-noreply@atlas.local}
      NOTIFICATION_SLACK_WEBHOOK_URL: ${NOTIFICATION_SLACK_WEBHOOK_URL:-}
      NOTIFICATION_SLACK_DEFAULT_CHANNEL: ${NOTIFICATION_SLACK_DEFAULT_CHANNEL:-}
      NOTIFICATION_SERVICE_JWT_SECRET_KEY: ${NOTIFICATION_SERVICE_JWT_SECRET_KEY:-atlas-service-jwt-dev-secret-change-me-32-bytes}
      NOTIFICATION_SERVICE_JWT_ALGORITHM: ${NOTIFICATION_SERVICE_JWT_ALGORITHM:-HS256}
      NOTIFICATION_SERVICE_JWT_ISSUER: ${NOTIFICATION_SERVICE_JWT_ISSUER:-atlascore}
      NOTIFICATION_SERVICE_JWT_TTL_SECONDS: ${NOTIFICATION_SERVICE_JWT_TTL_SECONDS:-300}
      NOTIFICATION_SERVICE_JWT_ALLOWED_CALLERS: ${NOTIFICATION_SERVICE_JWT_ALLOWED_CALLERS:-auth_api,core_api}
    ports:
      - "${NOTIFICATION_API_PORT:-8003}:8000"
    depends_on:
      redis:
        condition: service_healthy

  observability-api:
    build:
      context: .
      dockerfile: apps/observability_api/dockerfile
    container_name: atlas-observability-api
    profiles: ["dev", "apis", "observability", "platform"]
    environment:
      <<: [*atlas-service-urls, *atlas-cors]
      SERVICE_NAME: observability_api
      LOKI_URL: http://loki:3100
      LOKI_READY_URL: http://loki:3100/ready
      GRAFANA_URL: http://grafana:3000
      GRAFANA_HEALTH_URL: http://grafana:3000/api/health
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
    ports:
      - "${OBSERVABILITY_API_PORT:-8004}:8000"
    depends_on:
      - loki
      - grafana

volumes:
  postgres_data:
  redis_data:
